<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — True Path CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .form-control { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; color: #1e293b; box-sizing: border-box; transition: border-color .15s; }
    .form-control:focus { outline: none; border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14,165,233,.15); }
  </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-2xl font-bold text-slate-800">True Path CRM</div>
      <div class="text-sm text-slate-500 mt-1">International Rx</div>
    </div>

    <div class="bg-white rounded-2xl shadow-md border border-slate-200 p-8">
      <h1 class="text-xl font-semibold text-slate-800 mb-6">Sign In</h1>

      <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm"></div>

      <form id="login-form" onsubmit="doLogin(event)">
        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 mb-1.5">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required autofocus>
        </div>
        <div class="mb-6">
          <label class="block text-xs font-semibold text-slate-500 mb-1.5">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" id="submit-btn"
          class="w-full bg-sky-500 hover:bg-sky-600 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <script>
    if (localStorage.getItem('tp_token')) window.location.href = '/dashboard/';

    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.classList.add('hidden');
      btn.textContent = 'Signing in…';
      btn.disabled = true;

      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/.netlify/functions/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || 'Invalid email or password';
          errEl.classList.remove('hidden');
        } else {
          localStorage.setItem('tp_token', data.token);
          localStorage.setItem('tp_user', JSON.stringify(data.user));
          window.location.href = '/dashboard/';
        }
      } catch {
        errEl.textContent = 'Connection error — please try again';
        errEl.classList.remove('hidden');
      }

      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  </script>
</body>
</html>
