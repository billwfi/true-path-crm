<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Record — True Path CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body class="bg-slate-100 text-slate-700">
<div id="app" class="flex h-screen overflow-hidden">
  <div id="nav-placeholder"></div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div id="topbar"></div>
    <main class="flex-1 overflow-y-auto p-6">

      <div class="search-bar">
        <a class="btn btn-outline" href="/clients/"><i class="fa-solid fa-arrow-left"></i> Back to Clients</a>
        <span class="ml-2 text-lg font-semibold" id="client-name">New Client</span>
      </div>

      <!-- Tabs -->
      <div id="tabbar" class="flex gap-6 border-b border-slate-200 mb-4 px-1">
        <button class="tab-btn" data-tab="demographics" onclick="showTab('demographics')">Demographics</button>
        <button class="tab-btn" data-tab="contacts" onclick="showTab('contacts')">
          Contacts <span id="tab-contacts" class="badge badge-blue ml-1">0</span></button>
        <button class="tab-btn" data-tab="contracts" onclick="showTab('contracts')">
          Contracts <span id="tab-contracts" class="badge badge-blue ml-1">0</span></button>
        <button class="tab-btn" data-tab="eligibility" onclick="showTab('eligibility')">Eligibility</button>
      </div>

      <!-- Demographics panel -->
      <div class="tab-panel" data-panel="demographics">
        <div class="card">
          <div class="card-header"><span class="card-title"><i class="fa-solid fa-id-card text-slate-400 mr-2"></i>Demographics</span></div>
          <div class="card-body">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="form-group mb-0"><label class="form-label">First Name *</label><input class="form-control" id="f-firstname"></div>
              <div class="form-group mb-0"><label class="form-label">Last Name</label><input class="form-control" id="f-lastname"></div>
              <div class="form-group mb-0"><label class="form-label">Email</label><input class="form-control" type="email" id="f-email"></div>
              <div class="form-group mb-0"><label class="form-label">Phone</label><input class="form-control" id="f-phone"></div>
              <div class="form-group mb-0"><label class="form-label">Company</label>
                <select class="form-control" id="f-company_id"><option value="">— None —</option></select></div>
              <div class="form-group mb-0"><label class="form-label">Broker</label>
                <select class="form-control" id="f-broker_id"><option value="">— None —</option></select></div>
              <div class="form-group mb-0"><label class="form-label">Groups</label><input class="form-control" id="f-groups" placeholder="e.g. 340B, VIP"></div>
              <div class="form-group mb-0"><label class="form-label">Active</label>
                <select class="form-control" id="f-active"><option value="1">Yes</option><option value="0">No</option></select></div>
              <div class="form-group mb-0"><label class="form-label">iRx Client ID (CARRIER)</label>
                <input class="form-control" id="f-irx_client_id" placeholder="Matches eligibility CARRIER"></div>
              <div class="form-group mb-0"></div>
              <div class="form-group mb-0 md:col-span-2"><label class="form-label">Notes</label><textarea class="form-control" id="f-notes" rows="3"></textarea></div>
            </div>
            <div class="flex items-center gap-3 mt-4">
              <button class="btn btn-primary" onclick="saveDemographics()"><i class="fa-solid fa-floppy-disk"></i> Save</button>
              <button class="btn btn-danger" id="delete-btn" onclick="doDeleteClient()" style="display:none"><i class="fa-solid fa-trash"></i> Delete</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Contacts panel -->
      <div class="tab-panel" data-panel="contacts" style="display:none">
        <div class="card">
          <div class="card-header flex items-center">
            <span class="card-title"><i class="fa-solid fa-address-book text-slate-400 mr-2"></i>Contacts</span>
            <button class="btn btn-primary btn-sm ml-auto" onclick="openContact()"><i class="fa-solid fa-plus"></i> Add Contact</button>
          </div>
          <div class="card-body">
            <table class="data-table">
              <thead><tr><th>Name</th><th>Title</th><th>Email</th><th>Phone</th><th>Notes</th><th></th></tr></thead>
              <tbody id="contacts-body"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Contracts panel -->
      <div class="tab-panel" data-panel="contracts" style="display:none">
        <div class="flex items-center mb-4">
          <span class="text-sm text-slate-500">Contracts and their benefits</span>
          <button class="btn btn-primary btn-sm ml-auto" onclick="openContract()"><i class="fa-solid fa-plus"></i> Add Contract</button>
        </div>
        <div id="contracts-list"></div>
      </div>

      <!-- Eligibility panel (read-only, from irx.dbo.eligibility by CARRIER) -->
      <div class="tab-panel" data-panel="eligibility" style="display:none">
        <div class="search-bar">
          <input type="text" id="elig-search" class="form-control" placeholder="Search member ID or name…" oninput="debounceElig()">
          <span class="text-sm text-slate-500" id="elig-meta"></span>
        </div>
        <div class="card">
          <div class="card-body">
            <div id="elig-empty" class="text-center py-10 text-slate-400" style="display:none"></div>
            <div id="elig-table-wrap" style="overflow-x:auto">
              <table class="data-table">
                <thead><tr>
                  <th>Member ID</th><th>Name</th><th>DOB</th><th>Sex</th><th>Rel</th><th>Type</th>
                  <th>Group</th><th>Effective</th><th>Term</th><th>City</th><th>State</th>
                </tr></thead>
                <tbody id="elig-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Contact modal -->
<div id="contact-modal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="contact-modal-title">Add Contact</span>
      <button class="modal-close" onclick="closeModal('contact-modal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="ct-id">
      <div class="form-group"><label class="form-label">Name *</label><input class="form-control" id="ct-name"></div>
      <div class="flex gap-3">
        <div class="form-group flex-1"><label class="form-label">Title</label><input class="form-control" id="ct-title"></div>
        <div class="form-group flex-1"><label class="form-label">Phone</label><input class="form-control" id="ct-phone"></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-control" type="email" id="ct-email"></div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-control" id="ct-notes" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('contact-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveContact()">Save</button>
    </div>
  </div>
</div>

<!-- Contract modal -->
<div id="contract-modal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="contract-modal-title">Add Contract</span>
      <button class="modal-close" onclick="closeModal('contract-modal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="co-id">
      <div class="form-group"><label class="form-label">Name / Title *</label><input class="form-control" id="co-name"></div>
      <div class="flex gap-3">
        <div class="form-group flex-1"><label class="form-label">Contract #</label><input class="form-control" id="co-number"></div>
        <div class="form-group flex-1"><label class="form-label">Status</label>
          <select class="form-control" id="co-status">
            <option>Active</option><option>Pending</option><option>Expired</option><option>Cancelled</option>
          </select></div>
      </div>
      <div class="flex gap-3">
        <div class="form-group flex-1"><label class="form-label">Effective Date</label><input type="date" class="form-control" id="co-eff"></div>
        <div class="form-group flex-1"><label class="form-label">Renewal / End Date</label><input type="date" class="form-control" id="co-end"></div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-control" id="co-notes" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('contract-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveContract()">Save</button>
    </div>
  </div>
</div>

<!-- Benefit modal -->
<div id="benefit-modal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="benefit-modal-title">Add Benefit</span>
      <button class="modal-close" onclick="closeModal('benefit-modal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="bn-id">
      <input type="hidden" id="bn-contract-id">
      <div class="form-group"><label class="form-label">Benefit Name *</label><input class="form-control" id="bn-name"></div>
      <div class="flex gap-3">
        <div class="form-group flex-1"><label class="form-label">Type / Category</label><input class="form-control" id="bn-type"></div>
        <div class="form-group flex-1"><label class="form-label">Value / Amount</label><input class="form-control" id="bn-value" placeholder="e.g. $5,000 or 80%"></div>
      </div>
      <div class="form-group"><label class="form-label">Coverage Details</label><textarea class="form-control" id="bn-coverage" rows="2"></textarea></div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-control" id="bn-notes" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('benefit-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveBenefit()">Save</button>
    </div>
  </div>
</div>

<script src="/assets/js/app.js"></script>
<script>
  initNav('client-record');

  const params = new URLSearchParams(location.search);
  let clientId = parseInt(params.get('id'), 10) || null;
  let contacts = [], contracts = [];
  let clientIrxId = null, eligLoaded = false, eligDebounce;

  const CONTRACT_COLORS = { Active: 'green', Pending: 'yellow', Expired: 'gray', Cancelled: 'red' };

  function showTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
    document.querySelectorAll('.tab-panel').forEach(p => p.style.display = p.dataset.panel === name ? '' : 'none');
    if (name === 'eligibility' && !eligLoaded) loadEligibility();
  }

  // Sub-resource tabs need a saved client. Disable them until one exists.
  function gateTabs() {
    const enabled = !!clientId;
    document.querySelectorAll('.tab-btn[data-tab="contacts"], .tab-btn[data-tab="contracts"], .tab-btn[data-tab="eligibility"]').forEach(b => {
      b.style.opacity = enabled ? '' : '0.4';
      b.style.pointerEvents = enabled ? '' : 'none';
      b.title = enabled ? '' : 'Save the client first';
    });
  }

  /* ── Demographics ── */
  async function populateDropdowns(selCompany, selBroker) {
    const [companies, brokers] = await Promise.all([
      apiGet('/companies').catch(() => []), apiGet('/brokers').catch(() => []),
    ]);
    document.getElementById('f-company_id').innerHTML = '<option value="">— None —</option>' +
      (companies || []).map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
    document.getElementById('f-broker_id').innerHTML = '<option value="">— None —</option>' +
      (brokers || []).map(b => `<option value="${b.id}">${esc(b.name)}</option>`).join('');
    if (selCompany != null) document.getElementById('f-company_id').value = selCompany || '';
    if (selBroker != null) document.getElementById('f-broker_id').value = selBroker || '';
  }

  async function loadClient() {
    await populateDropdowns();
    if (!clientId) {
      document.getElementById('client-name').textContent = 'New Client';
      gateTabs();
      return;
    }
    const c = await apiGet(`/clients?id=${clientId}`);
    if (!c) { showToast('Client not found', 'error'); return; }
    document.getElementById('f-firstname').value = c.firstname || '';
    document.getElementById('f-lastname').value = c.lastname || '';
    document.getElementById('f-email').value = c.email || '';
    document.getElementById('f-phone').value = c.phone || '';
    document.getElementById('f-company_id').value = c.company_id || '';
    document.getElementById('f-broker_id').value = c.broker_id || '';
    document.getElementById('f-groups').value = c.groups || '';
    document.getElementById('f-notes').value = c.notes || '';
    document.getElementById('f-active').value = c.active ? '1' : '0';
    document.getElementById('f-irx_client_id').value = c.irx_client_id || '';
    clientIrxId = c.irx_client_id || null;
    eligLoaded = false;  // re-evaluate eligibility after (re)load
    document.getElementById('client-name').textContent = `${c.firstname || ''} ${c.lastname || ''}`.trim() || `Client #${c.id}`;
    document.getElementById('delete-btn').style.display = '';
    gateTabs();
    await loadDetail();
  }

  function demoForm() {
    return {
      firstname: document.getElementById('f-firstname').value.trim(),
      lastname: document.getElementById('f-lastname').value.trim(),
      email: document.getElementById('f-email').value.trim(),
      phone: document.getElementById('f-phone').value.trim(),
      company_id: parseInt(document.getElementById('f-company_id').value) || null,
      broker_id: parseInt(document.getElementById('f-broker_id').value) || null,
      groups: document.getElementById('f-groups').value.trim(),
      notes: document.getElementById('f-notes').value.trim(),
      active: document.getElementById('f-active').value === '1',
      irx_client_id: document.getElementById('f-irx_client_id').value.trim(),
    };
  }

  async function saveDemographics() {
    const body = demoForm();
    if (!body.firstname) { showToast('First name is required', 'error'); return; }
    if (clientId) {
      const res = await apiPatch(`/clients?id=${clientId}`, body);
      if (res && res.ok) { showToast('Client updated', 'success'); loadClient(); }
      else showToast('Save failed', 'error');
    } else {
      const res = await apiPost('/clients', body);
      if (res && res.ok) {
        const data = await res.json().catch(() => ({}));
        showToast('Client created', 'success');
        location.replace(`/clients/record/?id=${data.id}`);  // reload in edit mode with all tabs
      } else showToast('Create failed', 'error');
    }
  }

  async function doDeleteClient() {
    if (!clientId || !confirm2('Delete this client?')) return;
    const res = await apiDelete(`/clients?id=${clientId}`);
    if (res && res.ok) { showToast('Deleted', 'success'); location.href = '/clients/'; }
    else showToast('Delete failed', 'error');
  }

  /* ── Detail (contacts + contracts/benefits) ── */
  async function loadDetail() {
    const data = await apiGet(`/client-detail?client_id=${clientId}`) || {};
    contacts = data.contacts || [];
    contracts = data.contracts || [];
    renderContacts();
    renderContracts();
  }

  /* ── Eligibility (read-only from irx.dbo.eligibility, matched on CARRIER) ── */
  function debounceElig() { clearTimeout(eligDebounce); eligDebounce = setTimeout(loadEligibility, 350); }

  async function loadEligibility() {
    const empty = document.getElementById('elig-empty');
    const wrap = document.getElementById('elig-table-wrap');
    const meta = document.getElementById('elig-meta');
    if (!clientIrxId) {
      eligLoaded = true;
      wrap.style.display = 'none'; meta.textContent = '';
      empty.style.display = ''; empty.textContent = 'Set the iRx Client ID (CARRIER) on the Demographics tab to view eligibility.';
      return;
    }
    const search = document.getElementById('elig-search').value;
    const url = `/client-detail?resource=eligibility&carrier=${encodeURIComponent(clientIrxId)}${
      search ? '&search=' + encodeURIComponent(search) : ''}`;
    const rows = await apiGet(url) || [];
    eligLoaded = true;
    if (!rows.length) {
      wrap.style.display = 'none';
      empty.style.display = ''; empty.textContent = search ? 'No matching members.' : 'No eligibility records for this CARRIER.';
      meta.textContent = '';
      return;
    }
    empty.style.display = 'none'; wrap.style.display = '';
    meta.textContent = `${rows.length}${rows.length === 1000 ? '+ (showing first 1000)' : ''} member${rows.length === 1 ? '' : 's'}`;
    document.getElementById('elig-body').innerHTML = rows.map(r => `<tr>
      <td class="font-mono text-xs">${esc(r.MEMBER_ID) || '—'}</td>
      <td class="font-medium">${esc(r.LAST_NAME || '')}, ${esc(r.FIRST_NAME || '')}</td>
      <td class="text-xs">${esc(r.DATE_OF_BIRTH) || '—'}</td>
      <td>${esc(r.SEX) || '—'}</td>
      <td>${esc(r.RELATIONSHIP_CODE) || '—'}</td>
      <td>${esc(r.MEMBER_TYPE) || '—'}</td>
      <td class="text-xs">${esc(r.GroupName || r.GRP) || '—'}</td>
      <td class="text-xs">${esc(r.MEMBER_FROM_DATE) || '—'}</td>
      <td class="text-xs">${esc(r.MEMBER_THRU_DATE) || '—'}</td>
      <td>${esc(r.CITY) || '—'}</td>
      <td>${esc(r.STATE) || '—'}</td>
    </tr>`).join('');
  }

  function renderContacts() {
    document.getElementById('tab-contacts').textContent = contacts.length;
    document.getElementById('contacts-body').innerHTML = contacts.length
      ? contacts.map(c => `<tr>
          <td class="font-medium">${esc(c.name)}</td>
          <td>${esc(c.title) || '—'}</td>
          <td>${esc(c.email) || '—'}</td>
          <td>${esc(c.phone) || '—'}</td>
          <td class="text-sm">${esc(c.notes) || '—'}</td>
          <td class="text-right whitespace-nowrap">
            <button class="btn btn-outline btn-sm" title="Edit" onclick='openContact(${c.id})'><i class="fa-solid fa-pen"></i></button>
            <button class="btn btn-danger btn-sm" title="Delete" onclick='deleteContact(${c.id})'><i class="fa-solid fa-trash"></i></button>
          </td></tr>`).join('')
      : '<tr><td colspan="6" class="text-center py-8 text-slate-400">No contacts yet</td></tr>';
  }

  function renderContracts() {
    document.getElementById('tab-contracts').textContent = contracts.length;
    document.getElementById('contracts-list').innerHTML = contracts.length
      ? contracts.map(co => `
        <div class="card mb-4">
          <div class="card-header flex items-center flex-wrap gap-2">
            <span class="card-title">${esc(co.name)}</span>
            ${statusBadge(co.status, CONTRACT_COLORS)}
            ${co.contract_number ? `<span class="text-xs text-slate-400 font-mono">#${esc(co.contract_number)}</span>` : ''}
            <span class="text-xs text-slate-400">${co.effective_date ? fmtDate(co.effective_date) : '—'} → ${co.end_date ? fmtDate(co.end_date) : '—'}</span>
            <span class="ml-auto flex gap-1">
              <button class="btn btn-primary btn-sm" title="Add Benefit" onclick='openBenefit(${co.id})'><i class="fa-solid fa-plus"></i> Benefit</button>
              <button class="btn btn-outline btn-sm" title="Edit contract" onclick='openContract(${co.id})'><i class="fa-solid fa-pen"></i></button>
              <button class="btn btn-danger btn-sm" title="Delete contract" onclick='deleteContract(${co.id})'><i class="fa-solid fa-trash"></i></button>
            </span>
          </div>
          <div class="card-body">
            ${co.notes ? `<p class="text-sm text-slate-500 mb-3">${esc(co.notes)}</p>` : ''}
            <table class="data-table">
              <thead><tr><th>Benefit</th><th>Type</th><th>Coverage</th><th>Value</th><th></th></tr></thead>
              <tbody>${co.benefits.length
                ? co.benefits.map(b => `<tr>
                    <td class="font-medium">${esc(b.name)}</td>
                    <td>${esc(b.type) || '—'}</td>
                    <td class="text-sm">${esc(b.coverage) || '—'}</td>
                    <td>${esc(b.value) || '—'}</td>
                    <td class="text-right whitespace-nowrap">
                      <button class="btn btn-outline btn-sm" title="Edit" onclick='openBenefit(${co.id}, ${b.id})'><i class="fa-solid fa-pen"></i></button>
                      <button class="btn btn-danger btn-sm" title="Delete" onclick='deleteBenefit(${b.id})'><i class="fa-solid fa-trash"></i></button>
                    </td></tr>`).join('')
                : '<tr><td colspan="5" class="text-center py-6 text-slate-400">No benefits on this contract yet</td></tr>'}
              </tbody>
            </table>
          </div>
        </div>`).join('')
      : '<div class="card"><div class="card-body text-center py-10 text-slate-400">No contracts yet</div></div>';
  }

  /* ── Contact CRUD ── */
  function openContact(id) {
    const c = id ? contacts.find(x => x.id === id) : null;
    document.getElementById('contact-modal-title').textContent = c ? 'Edit Contact' : 'Add Contact';
    document.getElementById('ct-id').value = c ? c.id : '';
    document.getElementById('ct-name').value = c ? (c.name || '') : '';
    document.getElementById('ct-title').value = c ? (c.title || '') : '';
    document.getElementById('ct-email').value = c ? (c.email || '') : '';
    document.getElementById('ct-phone').value = c ? (c.phone || '') : '';
    document.getElementById('ct-notes').value = c ? (c.notes || '') : '';
    openModal('contact-modal');
  }
  async function saveContact() {
    const id = document.getElementById('ct-id').value;
    const body = {
      name: document.getElementById('ct-name').value.trim(),
      title: document.getElementById('ct-title').value.trim(),
      email: document.getElementById('ct-email').value.trim(),
      phone: document.getElementById('ct-phone').value.trim(),
      notes: document.getElementById('ct-notes').value.trim(),
    };
    if (!body.name) { showToast('Name is required', 'error'); return; }
    const res = id
      ? await apiPatch(`/client-detail?resource=contact&id=${id}`, body)
      : await apiPost(`/client-detail?resource=contact&client_id=${clientId}`, body);
    if (res && res.ok) { showToast('Saved', 'success'); closeModal('contact-modal'); loadDetail(); }
    else showToast('Save failed', 'error');
  }
  async function deleteContact(id) {
    if (!confirm2('Delete this contact?')) return;
    const res = await apiDelete(`/client-detail?resource=contact&id=${id}`);
    if (res && res.ok) { showToast('Deleted', 'success'); loadDetail(); } else showToast('Delete failed', 'error');
  }

  /* ── Contract CRUD ── */
  function openContract(id) {
    const co = id ? contracts.find(x => x.id === id) : null;
    document.getElementById('contract-modal-title').textContent = co ? 'Edit Contract' : 'Add Contract';
    document.getElementById('co-id').value = co ? co.id : '';
    document.getElementById('co-name').value = co ? (co.name || '') : '';
    document.getElementById('co-number').value = co ? (co.contract_number || '') : '';
    document.getElementById('co-status').value = co ? (co.status || 'Active') : 'Active';
    document.getElementById('co-eff').value = co && co.effective_date ? String(co.effective_date).slice(0, 10) : '';
    document.getElementById('co-end').value = co && co.end_date ? String(co.end_date).slice(0, 10) : '';
    document.getElementById('co-notes').value = co ? (co.notes || '') : '';
    openModal('contract-modal');
  }
  async function saveContract() {
    const id = document.getElementById('co-id').value;
    const body = {
      name: document.getElementById('co-name').value.trim(),
      contract_number: document.getElementById('co-number').value.trim(),
      status: document.getElementById('co-status').value,
      effective_date: document.getElementById('co-eff').value || null,
      end_date: document.getElementById('co-end').value || null,
      notes: document.getElementById('co-notes').value.trim(),
    };
    if (!body.name) { showToast('Contract name is required', 'error'); return; }
    const res = id
      ? await apiPatch(`/client-detail?resource=contract&id=${id}`, body)
      : await apiPost(`/client-detail?resource=contract&client_id=${clientId}`, body);
    if (res && res.ok) { showToast('Saved', 'success'); closeModal('contract-modal'); loadDetail(); }
    else showToast('Save failed', 'error');
  }
  async function deleteContract(id) {
    if (!confirm2('Delete this contract and all its benefits?')) return;
    const res = await apiDelete(`/client-detail?resource=contract&id=${id}`);
    if (res && res.ok) { showToast('Deleted', 'success'); loadDetail(); } else showToast('Delete failed', 'error');
  }

  /* ── Benefit CRUD ── */
  function openBenefit(contractId, id) {
    let b = null;
    if (id) { const co = contracts.find(x => x.id === contractId); b = co && co.benefits.find(x => x.id === id); }
    document.getElementById('benefit-modal-title').textContent = b ? 'Edit Benefit' : 'Add Benefit';
    document.getElementById('bn-id').value = b ? b.id : '';
    document.getElementById('bn-contract-id').value = contractId;
    document.getElementById('bn-name').value = b ? (b.name || '') : '';
    document.getElementById('bn-type').value = b ? (b.type || '') : '';
    document.getElementById('bn-value').value = b ? (b.value || '') : '';
    document.getElementById('bn-coverage').value = b ? (b.coverage || '') : '';
    document.getElementById('bn-notes').value = b ? (b.notes || '') : '';
    openModal('benefit-modal');
  }
  async function saveBenefit() {
    const id = document.getElementById('bn-id').value;
    const contractId = document.getElementById('bn-contract-id').value;
    const body = {
      name: document.getElementById('bn-name').value.trim(),
      type: document.getElementById('bn-type').value.trim(),
      value: document.getElementById('bn-value').value.trim(),
      coverage: document.getElementById('bn-coverage').value.trim(),
      notes: document.getElementById('bn-notes').value.trim(),
    };
    if (!body.name) { showToast('Benefit name is required', 'error'); return; }
    const res = id
      ? await apiPatch(`/client-detail?resource=benefit&id=${id}`, body)
      : await apiPost(`/client-detail?resource=benefit&contract_id=${contractId}`, body);
    if (res && res.ok) { showToast('Saved', 'success'); closeModal('benefit-modal'); loadDetail(); }
    else showToast('Save failed', 'error');
  }
  async function deleteBenefit(id) {
    if (!confirm2('Delete this benefit?')) return;
    const res = await apiDelete(`/client-detail?resource=benefit&id=${id}`);
    if (res && res.ok) { showToast('Deleted', 'success'); loadDetail(); } else showToast('Delete failed', 'error');
  }

  ['contact-modal', 'contract-modal', 'benefit-modal'].forEach(m =>
    document.getElementById(m).addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(m); }));

  showTab('demographics');
  loadClient();
</script>
</body>
</html>
