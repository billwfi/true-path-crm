<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batch Orders — True Path CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body class="bg-slate-100 text-slate-700">
<div id="app" class="flex h-screen overflow-hidden">
  <div id="nav-placeholder"></div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div id="topbar"></div>
    <main class="flex-1 overflow-y-auto p-6">

      <div class="search-bar">
        <input type="text" id="search" class="form-control" placeholder="Search by patient, drug, transaction ID…" oninput="debounceLoad()">
        <button class="btn btn-primary" onclick="openNew()"><i class="fa-solid fa-plus"></i> Add Order</button>
      </div>

      <div class="filter-bar">
        <button class="filter-btn active" data-s="" onclick="setFilter(this,'')">All</button>
        <button class="filter-btn" data-s="Pending" onclick="setFilter(this,'Pending')">Pending</button>
        <button class="filter-btn" data-s="Processing" onclick="setFilter(this,'Processing')">Processing</button>
        <button class="filter-btn" data-s="Completed" onclick="setFilter(this,'Completed')">Completed</button>
        <button class="filter-btn" data-s="Error" onclick="setFilter(this,'Error')">Error</button>
      </div>

      <div class="card">
        <div class="card-body">
          <table class="data-table">
            <thead><tr>
              <th>Customer ID</th><th>Transaction ID</th><th>Patient</th>
              <th>Drug</th><th>Vendor</th><th>Strength</th>
              <th>Day Supply</th><th>Tx Price</th><th>Tx Cost</th>
              <th>Shipping</th><th>Status</th><th>Date</th><th></th>
            </tr></thead>
            <tbody id="tbl-body"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Order modal -->
<div id="order-modal" class="modal-backdrop hidden">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">New Batch Order</span>
      <button class="modal-close" onclick="closeModal('order-modal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-grid col3">
        <div class="form-group"><label class="form-label">Customer ID</label><input class="form-control" id="f-customer_id"></div>
        <div class="form-group"><label class="form-label">Transaction ID</label><input class="form-control" id="f-transaction_id"></div>
        <div class="form-group"><label class="form-label">Document / Patient ID</label><input class="form-control" id="f-doc_patient_id"></div>
        <div class="form-group"><label class="form-label">Patient Name</label><input class="form-control" id="f-customer_name"></div>
        <div class="form-group"><label class="form-label">Drug Name</label><input class="form-control" id="f-drug_name"></div>
        <div class="form-group"><label class="form-label">Vendor</label><input class="form-control" id="f-vendor"></div>
        <div class="form-group"><label class="form-label">Strength</label><input class="form-control" id="f-strength"></div>
        <div class="form-group"><label class="form-label">Day Supply</label><input class="form-control" type="number" id="f-day_supply"></div>
        <div class="form-group"><label class="form-label">Unit Qty</label><input class="form-control" type="number" step="0.01" id="f-unit_quantity"></div>
        <div class="form-group"><label class="form-label">Vendor Qty</label><input class="form-control" type="number" step="0.01" id="f-vendor_quantity"></div>
        <div class="form-group"><label class="form-label">Unit Price</label><input class="form-control" type="number" step="0.0001" id="f-unit_price"></div>
        <div class="form-group"><label class="form-label">Unit Cost</label><input class="form-control" type="number" step="0.0001" id="f-unit_cost"></div>
        <div class="form-group"><label class="form-label">Tx Price</label><input class="form-control" type="number" step="0.01" id="f-transaction_price"></div>
        <div class="form-group"><label class="form-label">Tx Cost</label><input class="form-control" type="number" step="0.01" id="f-transaction_cost"></div>
        <div class="form-group"><label class="form-label">Shipping Method</label>
          <select class="form-control" id="f-shipping_method">
            <option value="">— Select —</option><option>Standard</option><option>Overnight</option><option>2-Day</option><option>Pick Up</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Transaction Date</label><input class="form-control" type="date" id="f-transaction_date"></div>
        <div class="form-group"><label class="form-label">Order ID</label><input class="form-control" id="f-order_id"></div>
        <div class="form-group"><label class="form-label">Status</label>
          <select class="form-control" id="f-status">
            <option>Pending</option><option>Processing</option><option>Completed</option><option>Error</option><option>Rejected</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('order-modal')">Cancel</button>
      <button class="btn btn-danger btn-sm" id="delete-btn" onclick="doDelete()" style="display:none">Delete</button>
      <button class="btn btn-primary" onclick="save()">Save</button>
    </div>
  </div>
</div>

<script src="/assets/js/app.js"></script>
<script>
  initNav('batch');
  let filterStatus = '', debounce;

  function debounceLoad() { clearTimeout(debounce); debounce = setTimeout(load, 300); }
  function setFilter(btn, s) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); filterStatus = s; load();
  }

  async function load() {
    const search = document.getElementById('search').value;
    let url = '/batch?x=1';
    if (filterStatus) url += `&status=${encodeURIComponent(filterStatus)}`;
    if (search) url += `&search=${encodeURIComponent(search)}`;
    const data = await apiGet(url);
    if (!data) return;

    document.getElementById('tbl-body').innerHTML = data.length
      ? data.map(b => `<tr class="clickable" onclick="openEdit(${b.id})">
          <td class="font-mono text-xs">${esc(b.customer_id)||'—'}</td>
          <td class="font-mono text-xs">${esc(b.transaction_id)||'—'}</td>
          <td class="font-medium">${esc(b.customer_name)||'—'}</td>
          <td>${esc(b.drug_name)||'—'}</td>
          <td>${esc(b.vendor)||'—'}</td>
          <td>${esc(b.strength)||'—'}</td>
          <td class="text-center">${b.vendor_day_supply||'—'}</td>
          <td>${b.transaction_price ? fmtCurrency(b.transaction_price) : '—'}</td>
          <td>${b.transaction_cost  ? fmtCurrency(b.transaction_cost)  : '—'}</td>
          <td>${esc(b.shipping_method)||'—'}</td>
          <td>${statusBadge(b.status, BATCH_STATUS_COLORS)}</td>
          <td class="text-xs text-slate-400">${fmtDate(b.transaction_date)}</td>
          <td><button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openEdit(${b.id})"><i class="fa-solid fa-pen"></i></button></td>
        </tr>`).join('')
      : '<tr><td colspan="13" class="text-center py-10 text-slate-400">No batch orders found</td></tr>';
  }

  const FIELDS = ['customer_id','transaction_id','doc_patient_id','customer_name','drug_name','vendor','strength',
    'day_supply','unit_quantity','vendor_quantity','unit_price','unit_cost','transaction_price','transaction_cost',
    'shipping_method','transaction_date','order_id','status'];

  function openNew() {
    FIELDS.forEach(f => document.getElementById('f-'+f).value = '');
    document.getElementById('edit-id').value = '';
    document.getElementById('f-status').value = 'Pending';
    document.getElementById('delete-btn').style.display = 'none';
    document.getElementById('modal-title').textContent = 'New Batch Order';
    openModal('order-modal');
  }

  async function openEdit(id) {
    const b = await apiGet(`/batch?id=${id}`);
    if (!b) return;
    document.getElementById('edit-id').value = b.id;
    document.getElementById('f-customer_id').value      = b.customer_id       || '';
    document.getElementById('f-transaction_id').value   = b.transaction_id    || '';
    document.getElementById('f-doc_patient_id').value   = b.document_patient_id || '';
    document.getElementById('f-customer_name').value    = b.customer_name     || '';
    document.getElementById('f-drug_name').value        = b.drug_name         || '';
    document.getElementById('f-vendor').value           = b.vendor            || '';
    document.getElementById('f-strength').value         = b.strength          || '';
    document.getElementById('f-day_supply').value       = b.vendor_day_supply || '';
    document.getElementById('f-unit_quantity').value    = b.unit_quantity     || '';
    document.getElementById('f-vendor_quantity').value  = b.vendor_quantity   || '';
    document.getElementById('f-unit_price').value       = b.unit_price        || '';
    document.getElementById('f-unit_cost').value        = b.unit_cost         || '';
    document.getElementById('f-transaction_price').value= b.transaction_price || '';
    document.getElementById('f-transaction_cost').value = b.transaction_cost  || '';
    document.getElementById('f-shipping_method').value  = b.shipping_method   || '';
    document.getElementById('f-transaction_date').value = b.transaction_date ? b.transaction_date.slice(0,10) : '';
    document.getElementById('f-order_id').value         = b.order_id          || '';
    document.getElementById('f-status').value           = b.status            || 'Pending';
    document.getElementById('modal-title').textContent  = `Edit — ${b.customer_name || b.id}`;
    document.getElementById('delete-btn').style.display = '';
    openModal('order-modal');
  }

  function getForm() {
    const v = id => document.getElementById(id).value;
    return {
      customer_id: v('f-customer_id'), transaction_id: v('f-transaction_id'),
      document_patient_id: v('f-doc_patient_id'), customer_name: v('f-customer_name'),
      drug_name: v('f-drug_name'), vendor: v('f-vendor'), strength: v('f-strength'),
      vendor_day_supply: v('f-day_supply') || null, unit_quantity: v('f-unit_quantity') || null,
      vendor_quantity: v('f-vendor_quantity') || null, unit_price: v('f-unit_price') || null,
      unit_cost: v('f-unit_cost') || null, transaction_price: v('f-transaction_price') || null,
      transaction_cost: v('f-transaction_cost') || null, shipping_method: v('f-shipping_method'),
      transaction_date: v('f-transaction_date') || null, order_id: v('f-order_id'), status: v('f-status'),
    };
  }

  async function save() {
    const id = document.getElementById('edit-id').value;
    const body = getForm();
    const res = id ? await apiPatch(`/batch?id=${id}`, body) : await apiPost('/batch', body);
    if (res && res.ok) { showToast(id ? 'Order updated' : 'Order created', 'success'); closeModal('order-modal'); load(); }
    else showToast('Save failed', 'error');
  }

  async function doDelete() {
    const id = document.getElementById('edit-id').value;
    if (!id || !confirm2('Delete this order?')) return;
    const res = await apiDelete(`/batch?id=${id}`);
    if (res && res.ok) { showToast('Deleted', 'success'); closeModal('order-modal'); load(); }
    else showToast('Delete failed', 'error');
  }

  document.getElementById('order-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal('order-modal'); });
  load();
</script>
</body>
</html>
