<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brokers — True Path CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body class="bg-slate-100 text-slate-700">
<div id="app" class="flex h-screen overflow-hidden">
  <div id="nav-placeholder"></div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div id="topbar"></div>
    <main class="flex-1 overflow-y-auto p-6">
      <div class="search-bar">
        <input type="text" id="search" class="form-control" placeholder="Search brokers…" oninput="debounceLoad()">
        <button class="btn btn-primary" onclick="openNew()"><i class="fa-solid fa-plus"></i> New Broker</button>
      </div>
      <div class="card">
        <div class="card-body">
          <table class="data-table">
            <thead><tr><th>#</th><th>Name</th><th>Status</th><th>Email</th><th>Phone</th><th>Address</th><th>Created</th><th></th></tr></thead>
            <tbody id="tbl-body"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="modal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">New Broker</span>
      <button class="modal-close" onclick="closeModal('modal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-group"><label class="form-label">Broker Name *</label><input class="form-control" id="f-name"></div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Status</label>
          <select class="form-control" id="f-status"><option>Active</option><option>Inactive</option></select>
        </div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-control" type="email" id="f-email"></div>
        <div class="form-group"><label class="form-label">Phone</label><input class="form-control" id="f-phone"></div>
        <div class="form-group"><label class="form-label">Address</label><input class="form-control" id="f-address"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal')">Cancel</button>
      <button class="btn btn-danger btn-sm" id="delete-btn" onclick="doDelete()" style="display:none">Delete</button>
      <button class="btn btn-primary" onclick="save()">Save</button>
    </div>
  </div>
</div>

<script src="/assets/js/app.js"></script>
<script>
  initNav('brokers');
  let debounce;
  function debounceLoad() { clearTimeout(debounce); debounce = setTimeout(load, 300); }

  async function load() {
    const s = document.getElementById('search').value;
    const data = await apiGet(`/brokers${s ? '?search=' + encodeURIComponent(s) : ''}`);
    if (!data) return;
    document.getElementById('tbl-body').innerHTML = data.length
      ? data.map(b => `<tr class="clickable" onclick="openEdit(${b.id})">
          <td class="text-slate-400 font-mono text-xs">#${b.id}</td>
          <td class="font-medium">${esc(b.name)}</td>
          <td>${b.status === 'Active' ? '<span class="badge badge-green">Active</span>' : '<span class="badge badge-gray">Inactive</span>'}</td>
          <td>${esc(b.email)||'—'}</td>
          <td>${esc(b.phone)||'—'}</td>
          <td>${esc(b.address)||'—'}</td>
          <td class="text-xs text-slate-400">${fmtDate(b.created_at)}</td>
          <td><button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openEdit(${b.id})"><i class="fa-solid fa-pen"></i></button></td>
        </tr>`).join('')
      : '<tr><td colspan="8" class="text-center py-10 text-slate-400">No brokers found</td></tr>';
  }

  function openNew() {
    ['edit-id','f-name','f-email','f-phone','f-address'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-status').value = 'Active';
    document.getElementById('delete-btn').style.display = 'none';
    document.getElementById('modal-title').textContent = 'New Broker';
    openModal('modal');
  }

  async function openEdit(id) {
    const b = await apiGet(`/brokers?id=${id}`);
    if (!b) return;
    document.getElementById('edit-id').value  = b.id;
    document.getElementById('f-name').value   = b.name    || '';
    document.getElementById('f-status').value = b.status  || 'Active';
    document.getElementById('f-email').value  = b.email   || '';
    document.getElementById('f-phone').value  = b.phone   || '';
    document.getElementById('f-address').value= b.address || '';
    document.getElementById('modal-title').textContent = `Edit — ${b.name}`;
    document.getElementById('delete-btn').style.display = '';
    openModal('modal');
  }

  async function save() {
    const id = document.getElementById('edit-id').value;
    const body = { name: document.getElementById('f-name').value.trim(), status: document.getElementById('f-status').value,
      email: document.getElementById('f-email').value.trim(), phone: document.getElementById('f-phone').value.trim(),
      address: document.getElementById('f-address').value.trim() };
    if (!body.name) { showToast('Name required', 'error'); return; }
    const res = id ? await apiPatch(`/brokers?id=${id}`, body) : await apiPost('/brokers', body);
    if (res && res.ok) { showToast(id ? 'Updated' : 'Created', 'success'); closeModal('modal'); load(); }
    else showToast('Save failed', 'error');
  }

  async function doDelete() {
    const id = document.getElementById('edit-id').value;
    if (!id || !confirm2('Delete this broker?')) return;
    const res = await apiDelete(`/brokers?id=${id}`);
    if (res && res.ok) { showToast('Deleted', 'success'); closeModal('modal'); load(); }
    else showToast('Delete failed', 'error');
  }

  document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal('modal'); });
  load();
</script>
</body>
</html>
